name: Daily Pull-Shark PR

on:
  schedule:        # 06:15 AWST every day (22:15 UTC)
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Why are you running this?"
        required: false
        default: ""
      branch_suffix:
        description: "Custom suffix for the feature branch"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-pr:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Git user
      run: |
        git config --global user.name  "🦈 Pull-Shark Bot"
        git config --global user.email "actions@users.noreply.github.com"

    - name: Determine branch name
      id: vars
      env:
        BRANCH_SUFFIX: ${{ github.event.inputs.branch_suffix }}
        RUN_REASON:    ${{ github.event.inputs.run_reason }}
      run: |
        DATE_TAG=$(date +%Y%m%d)
        SUFFIX=${BRANCH_SUFFIX:-$DATE_TAG}
        REASON=${RUN_REASON:-scheduled-run}
        echo "branch=auto/readme-bump-${SUFFIX}" >> "$GITHUB_OUTPUT"
        echo "reason=${REASON}"                  >> "$GITHUB_OUTPUT"

    - name: Create feature branch and tweak README
      run: |
        git switch -c "${{ steps.vars.outputs.branch }}"
        echo -e "\n\n_Last automated touch: $(date -u)  (${{
          steps.vars.outputs.reason }})_" >> README.md
        git add README.md
        git commit -m "chore: README timestamp – ${{ steps.vars.outputs.reason }}"
        git push -u origin "${{ steps.vars.outputs.branch }}"

    # ── NEW STEP: create the label if missing ──
    - name: Ensure 'auto-pr' label exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if ! gh label list | grep -q '^auto-pr'; then
          gh label create auto-pr --color EEEEEE --description "Automated PRs" --force
        fi
    # ──────────────────────────────────────────

    - name: Open pull request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --title "🤖 README refresh – ${{ steps.vars.outputs.reason }}" \
          --body  "Automated PR created by the Pull-Shark bot." \
          --head  "${{ steps.vars.outputs.branch }}" \
          --base  ${{ github.ref_name }} \
          --label "auto-pr"

    - name: Merge PR & delete branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PR_NUMBER=$(gh pr list --state open --head "${{ steps.vars.outputs.branch }}" \
                    --json number -q '.[0].number')
        gh pr merge "$PR_NUMBER" --squash \
                                 --subject "chore: daily README bump" \
                                 --delete-branch --admin
