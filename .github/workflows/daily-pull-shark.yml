name: Daily Pull-Shark PR

on:
  schedule:                # 06 :15 AWST daily  (22 :15 UTC)
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Note for commit / PR title"
        default: ""
      branch_suffix:
        description: "Branch suffix (blank = YYYYMMDD)"
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-pr:
    runs-on: ubuntu-latest
    env:
      # ──  PRIMARY = Dev Turtlestack  ──────────────────────────────
      PRIMARY_NAME:  "Dev Turtlestack"
      PRIMARY_EMAIL: "devturtlestack@gmail.com"
      # ──  CO-AUTHOR = Rhys Lewis  ────────────────────────────────
      CO_NAME:       "Rhys Lewis"
      CO_EMAIL:      "rhysjohnlewis@gmail.com"

    steps:
      # 1  checkout default branch
      - uses: actions/checkout@v4

      # 2  masquerade as Dev Turtlestack
      - name: Configure Git user (Dev)
        run: |
          git config --global user.name  "${PRIMARY_NAME}"
          git config --global user.email "${PRIMARY_EMAIL}"

      # 3  decide branch + reason
      - name: Compute branch metadata
        id: vars
        env:
          BRANCH_SUFFIX: ${{ github.event.inputs.branch_suffix }}
          RUN_REASON:    ${{ github.event.inputs.run_reason }}
        run: |
          DATE=$(date +%Y%m%d)
          echo "branch=auto/dev-readme-bump-${BRANCH_SUFFIX:-$DATE}" >>"$GITHUB_OUTPUT"
          echo "reason=${RUN_REASON:-scheduled-run}"                  >>"$GITHUB_OUTPUT"

      # 4  tweak README, commit (primary = Dev, trailer = Rhys), push
      - name: Add commit with Rhys as co-author
        run: |
          set -e
          git fetch origin
          git switch -C "${{ steps.vars.outputs.branch }}"

          printf "\n\n_Last automated touch: %s  (%s)_" \
                 "$(date -u)" "${{ steps.vars.outputs.reason }}" >>README.md
          git add README.md

          git commit -m $'chore: README timestamp – '"${{ steps.vars.outputs.reason }}"$'\n\nCo-authored-by: '"${CO_NAME}"' <'"${CO_EMAIL}"'>'

          git push --force-with-lease -u origin "${{ steps.vars.outputs.branch }}"

      # 5  ensure the PR label exists
      - name: Ensure auto-pr label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label list | grep -q '^auto-pr' || \
          gh label create auto-pr --color EEEEEE --description "Automated PRs"

      # 6  open (or reuse) a pull request
      - name: Create or reuse PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUM=$(gh pr list --state open --head "${{ steps.vars.outputs.branch }}" \
                   --json number -q '.[0].number')
          if [ -z "$PR_NUM" ]; then
            gh pr create \
              --title  "🤖 README refresh – ${{ steps.vars.outputs.reason }}" \
              --body   "Automated PR by Dev Turtlestack (co-author Rhys Lewis)." \
              --head   "${{ steps.vars.outputs.branch }}" \
              --base   main \
              --label  auto-pr
            PR_NUM=$(gh pr list --state open --head "${{ steps.vars.outputs.branch }}" \
                       --json number -q '.[0].number')
          fi
          PR_URL=$(gh pr view "$PR_NUM" --json url -q .url)
          echo "pr_url=$PR_URL" >>"$GITHUB_OUTPUT"
          echo "PR URL: $PR_URL"

      # 7  merge PR, delete branch
      - name: Merge PR and clean up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_url }}" \
            --merge --delete-branch --admin
