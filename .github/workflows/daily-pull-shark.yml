name: Daily Pull-Shark PR

on:
  schedule:              # 06 :15 AWST daily (22 :15 UTC)
    - cron: "15 22 * * *"

  workflow_dispatch:
    inputs:
      run_reason:
        description: "Note for commit / PR title"
        default: ""
      branch_suffix:
        description: "Branch suffix (blank = YYYYMMDD)"
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-pr:
    runs-on: ubuntu-latest
    env:
      PRIMARY_NAME:  "Rhys Lewis"
      PRIMARY_EMAIL: "rhysjohnlewis@gmail.com"
      CO_NAME_1:     "Dev Turtlestack"
      CO_EMAIL_1:    "devturtlestack@gmail.com"
      CO_NAME_2:     "github-actions[bot]"
      CO_EMAIL_2:    "41898282+github-actions[bot]@users.noreply.github.com"

    steps:
      # 1 – checkout
      - uses: actions/checkout@v4

      # 2 – primary author
      - name: Configure Git user
        run: |
          git config --global user.name  "${PRIMARY_NAME}"
          git config --global user.email "${PRIMARY_EMAIL}"

      # 3 – branch + reason
      - name: Compute branch metadata
        id: vars
        env:
          BRANCH_SUFFIX: ${{ github.event.inputs.branch_suffix }}
          RUN_REASON:    ${{ github.event.inputs.run_reason }}
        run: |
          DATE=$(date +%Y%m%d)
          SUFFIX="${BRANCH_SUFFIX:-$DATE}"
          REASON="${RUN_REASON:-scheduled-run}"
          echo "branch=auto/readme-bump-${SUFFIX}" >>"$GITHUB_OUTPUT"
          echo "reason=${REASON}"                  >>"$GITHUB_OUTPUT"

      # 4 – edit README, commit w/ trailers, push
      - name: Update README and push branch
        run: |
          set -e
          git fetch origin
          git switch -C "${{ steps.vars.outputs.branch }}"

          printf "\n\n_Last automated touch: %s  (%s)_" \
                 "$(date -u)" "${{ steps.vars.outputs.reason }}" >>README.md
          git add README.md

          git commit -m $'chore: README timestamp – '"${{ steps.vars.outputs.reason }}"$'\n\nCo-authored-by: '"${CO_NAME_1}"' <'"${CO_EMAIL_1}"'>\nCo-authored-by: '"${CO_NAME_2}"' <'"${CO_EMAIL_2}"'>'

          git push --force-with-lease -u origin "${{ steps.vars.outputs.branch }}"

      # 5 – ensure label exists
      - name: Ensure auto-pr label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label list | grep -q '^auto-pr' || \
          gh label create auto-pr --color EEEEEE --description "Automated PRs"

      # 6 – create (or reuse) PR and capture URL
      - name: Create or reuse PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUM=$(gh pr list --state open --head "${{ steps.vars.outputs.branch }}" \
                     --json number -q '.[0].number')
          if [ -z "$PR_NUM" ]; then
            gh pr create \
              --title  "🤖 README refresh – ${{ steps.vars.outputs.reason }}" \
              --body   "Automated PR for badge farming." \
              --head   "${{ steps.vars.outputs.branch }}" \
              --base   main \
              --label  auto-pr
            PR_NUM=$(gh pr list --state open --head "${{ steps.vars.outputs.branch }}" \
                       --json number -q '.[0].number')
          fi
          PR_URL=$(gh pr view "$PR_NUM" --json url -q .url)
          echo "pr_url=$PR_URL" >>"$GITHUB_OUTPUT"
          echo "PR URL: $PR_URL"

      # 7 – merge & delete branch
      - name: Merge PR and clean up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_url }}" \
            --merge --delete-branch --admin
